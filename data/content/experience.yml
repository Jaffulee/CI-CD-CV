        Builds customer-facing workflow features and internal automation for a B2B SaaS product, bringing strong commercial context from an earlier sales career.
      full: |
        Builds customer-facing workflow features and internal automation for a B2B SaaS product. Work includes React interfaces, TypeScript services, PostgreSQL schema changes, API integrations, automated tests, and CI improvements. Uses prior sales experience to clarify user needs, spot adoption risks, and translate customer feedback into practical engineering tasks.
