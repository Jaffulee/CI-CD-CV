          priority: 8
      manager:
        - text: Aligned product, sales, and customer success stakeholders around delivery priorities
          priority: 10
        - text: Helped break ambiguous customer requests into sequenced engineering work
          priority: 9
        - text: Communicated release impact in language suitable for commercial and technical teams
          priority: 8

