        Develops full-stack product features with TypeScript, React, Node.js, and PostgreSQL. Work includes API design, database changes, test coverage, CI updates, and production support for customer-facing workflows.
      management: |
        Coordinates with product, customer success, and engineering colleagues to turn commercial requirements into deliverable software increments with clear ownership and release notes.
