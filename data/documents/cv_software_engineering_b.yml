id: cv-software-engineering-b
output_name: cv_software_engineering_b
title: SOFTWARE ENGINEERING CV
prompt_injection: true
prompt_injection_variant: data_engineering

details:
  contact_variant: short
  headline_variant: software_engineering

rendering:
  markdown:
    template_file: styles/markdown/cv.md.j2
  latex:
    preamble_file: styles/latex/preamble_default.tex
    template_file: styles/latex/cv.tex.j2
  html:
    template_file: styles/html/cv.html.j2
    stylesheets:
      - styles/html/cv.css
      - styles/html/print.css

sections:
  - name: Software Engineering Experience
    source: experience
    entries:
      - id: platform-software-engineer-2025
        mode: bullets
        bullet_set: software
        max_bullets: 3
        show_tools: true
      - id: software-engineering-transition-2024
        mode: bullets
        bullet_set: software
        max_bullets: 2
        show_tools: true
      - id: senior-account-manager-2021
        mode: variant
        variant: software_engineering
        show_tools: false
      - id: sales-team-lead-2019
        mode: variant
        variant: software_engineering
        show_tools: false
      - id: sales-associate-2016
        mode: variant
        variant: software_engineering
        show_tools: false

  - name: Projects
    source: projects
    entries:
      - id: sales-forecasting-app
        mode: variant
        variant: software_engineering
        show_tools: true
      - id: crm-task-automation
        mode: variant
        variant: software_engineering
        show_tools: true
      - id: github-additional-projects
        mode: variant
        variant: software_engineering
        show_tools: true

  - name: Certifications, Education, and Writing
    source: mixed
    entries:
      - source: certifications
        id: full-stack-web-development-2024
        mode: variant
        variant: short
      - source: certifications
        id: aws-cloud-practitioner-2024
        mode: variant
        variant: short
      - source: education
        id: software-engineering-diploma-2024
        mode: variant
        variant: short
      - source: research
        id: commercial-to-engineering-transition-note-2024
        mode: variant
        variant: short
      - source: talks
        id: career-change-lightning-talk-2025
        mode: variant
        variant: short

  - name: Links
    source: links
    entries:
      - id: github
        mode: link
        show_description: true
        display_text: https://github.com/your-name-example
      - id: website-portfolio
        mode: link
        show_description: true
        display_text: https://your-name-example.github.io/
      - id: technical-blog
        mode: link
        show_description: true
        display_text: https://your-name-example.github.io/blog/
      - id: linkedin
        mode: link
        show_description: false
        display_text: https://www.linkedin.com/in/your-name-example/
